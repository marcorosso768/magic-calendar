name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac app bundles (x64 + arm64)
        run: npx electron-builder --mac dir --x64 --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Install dmgbuild
        run: pip3 install dmgbuild --break-system-packages

      - name: Create DMGs
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")

          dmgbuild \
            -s build-resources/dmgbuild-settings.py \
            -D "app=dist/mac/Magic Calendar.app" \
            "Magic Calendar" \
            "dist/Magic Calendar-${VERSION}-x64.dmg"

          dmgbuild \
            -s build-resources/dmgbuild-settings.py \
            -D "app=dist/mac-arm64/Magic Calendar.app" \
            "Magic Calendar" \
            "dist/Magic Calendar-${VERSION}-arm64.dmg"

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
          retention-days: 30

      - name: Release Mac assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe
          retention-days: 30

      - name: Release Windows asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
